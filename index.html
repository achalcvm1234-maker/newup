<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persistent File & Folder Upload/Download</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
  body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#6a11cb,#2575fc);}
  .container{background:#fff;border-radius:15px;padding:40px 30px;width:100%;max-width:600px;text-align:center;box-shadow:0 15px 25px rgba(0,0,0,0.2);}
  h1{margin-bottom:20px;color:#333;font-size:1.8rem;}
  input[type="file"]{display:none;}
  .buttons{display:flex;justify-content:center;gap:20px;margin-bottom:20px;flex-wrap:wrap;}
  .btn-upload{padding:15px 25px;border-radius:10px;border:none;cursor:pointer;background:#6a11cb;color:#fff;font-size:1rem;transition:0.3s;}
  .btn-upload:hover{background:#2575fc;}
  .file-list{margin-top:20px;text-align:left;max-height:300px;overflow-y:auto;}
  .file-list li{margin-bottom:10px;padding:10px;border-radius:5px;background:#f1f1f1;word-break:break-all;display:flex;justify-content:space-between;align-items:center;}
  .file-actions button{margin-left:5px;padding:5px 10px;border:none;color:white;border-radius:5px;cursor:pointer;transition:0.3s;}
  .file-actions .download-btn{background:#6a11cb;}
  .file-actions .download-btn:hover{background:#2575fc;}
  .file-actions .delete-btn{background:#ff4b5c;}
  .file-actions .delete-btn:hover{background:#ff1f3d;}
  @media(max-width:600px){.container{padding:30px 20px;}h1{font-size:1.5rem;}}
</style>
</head>
<body>

<div class="container">
  <h1>Upload Files or Folder</h1>
  <div class="buttons">
    <label class="btn-upload">
      Upload Files
      <input type="file" id="fileInput" multiple>
    </label>
    <label class="btn-upload">
      Upload Folder
      <input type="file" id="folderInput" webkitdirectory directory multiple>
    </label>
  </div>
  <ul class="file-list" id="fileList"></ul>
</div>

<script>
// IndexedDB setup
let db;
const request = indexedDB.open('fileDB', 1);
request.onupgradeneeded = e => {
  db = e.target.result;
  db.createObjectStore('files', { keyPath: 'id', autoIncrement: true });
};
request.onsuccess = e => {
  db = e.target.result;
  loadFiles();
};
request.onerror = e => console.error('IndexedDB error', e);

const fileInput = document.getElementById('fileInput');
const folderInput = document.getElementById('folderInput');
const fileList = document.getElementById('fileList');

// Add files to IndexedDB
function addFilesToDB(files) {
  const tx = db.transaction('files', 'readwrite');
  const store = tx.objectStore('files');
  files.forEach(f => store.add({ name: f.webkitRelativePath || f.name, file: f }));
  tx.oncomplete = () => loadFiles();
}

// Load files from DB
function loadFiles() {
  fileList.innerHTML = '';
  const tx = db.transaction('files', 'readonly');
  const store = tx.objectStore('files');
  store.openCursor().onsuccess = e => {
    const cursor = e.target.result;
    if(cursor){
      const {id, name, file} = cursor.value;
      const li = document.createElement('li');
      const nameSpan = document.createElement('span');
      nameSpan.textContent = name;

      const actionsDiv = document.createElement('div');
      actionsDiv.classList.add('file-actions');

      const downloadBtn = document.createElement('button');
      downloadBtn.textContent = 'Download';
      downloadBtn.classList.add('download-btn');
      downloadBtn.addEventListener('click', () => downloadFile(file));

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.classList.add('delete-btn');
      deleteBtn.addEventListener('click', () => deleteFile(id));

      actionsDiv.appendChild(downloadBtn);
      actionsDiv.appendChild(deleteBtn);

      li.appendChild(nameSpan);
      li.appendChild(actionsDiv);
      fileList.appendChild(li);
      cursor.continue();
    }
  };
}

// Download file
function downloadFile(file) {
  const url = URL.createObjectURL(file);
  const a = document.createElement('a');
  a.href = url;
  a.download = file.name;
  a.click();
  URL.revokeObjectURL(url);
}

// Delete file from DB
function deleteFile(id) {
  const tx = db.transaction('files', 'readwrite');
  tx.objectStore('files').delete(id);
  tx.oncomplete = () => loadFiles();
}

// Event listeners
fileInput.addEventListener('change', e => addFilesToDB(Array.from(e.target.files)));
folderInput.addEventListener('change', e => addFilesToDB(Array.from(e.target.files)));

</script>
</body>
</html>
